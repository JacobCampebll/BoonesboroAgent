<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Allen Company">
  <style>
    .h{font-family:"Arial Black","Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:900;fill:#000}
    .s{font-family:"Arial Narrow",Arial,Helvetica,sans-serif;font-weight:700;fill:#000}
  </style>
  <rect width="512" height="512" fill="#fff"/>
  <!-- top row: THE ==== CO. -->
  <text class="s" x="86" y="196" font-size="30">THE</text>
  <rect x="150" y="176" width="86" height="10" fill="#000"/>
  <text class="s" x="426" y="196" font-size="30" text-anchor="end">CO.</text>
  <rect x="276" y="176" width="86" height="10" fill="#000"/>
  <!-- ALLEN wordmark -->
  <text class="h" x="256" y="290" font-size="108" letter-spacing="2" text-anchor="middle">ALLEN</text>
  <!-- INC banner -->
  <rect x="196" y="300" width="120" height="34" fill="#000"/>
  <text x="256" y="326" font-size="26" letter-spacing="6" text-anchor="middle" fill="#fff"
        font-family="Arial Narrow,Arial,sans-serif" font-weight="700">INC</text>
  <!-- bottom rules + taglines -->
  <rect x="60" y="352" width="150" height="6" fill="#000"/>
  <rect x="302" y="352" width="150" height="6" fill="#000"/>
  <text class="s" x="86" y="374" font-size="19">SERVING KENTUCKY</text>
  <text class="s" x="426" y="374" font-size="19" text-anchor="end">SINCE 1939</text>
</svg>
