<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boonesboro Lab Agent — BT3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<style>
  :root{
    --bg:#ffffff; --panel:#f7f7f8; --border:#e5e5e5;
    --text:#0d0d0d; --muted:#8f8f8f; --accent:#f5a623;
    --user:#f4f4f4; --err:#b3261e;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font:15px/1.6 ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;padding:12px 20px;
    background:var(--bg);border-bottom:1px solid #ececec;flex:0 0 auto}
  header .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  header h1{font-size:16px;margin:0;font-weight:600}
  header .sub{color:var(--muted);font-size:12.5px}
  header select{margin-left:auto;background:var(--bg);color:var(--text);border:1px solid #dcdcdc;
    border-radius:999px;padding:6px 12px;font:600 13px/1 inherit;cursor:pointer;outline:none}
  #log{flex:1 1 auto;overflow-y:auto;padding:24px max(16px,calc(50% - 384px)) 32px}
  .turn{margin:0 0 24px}
  .user-msg{background:var(--user);border:none;border-radius:18px;
    padding:10px 16px;margin-left:auto;width:fit-content;max-width:75%;
    white-space:pre-wrap;word-wrap:break-word}
  .agent{background:none;border:none;border-radius:0;padding:2px 0}
  .activity{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 10px}
  .tchip{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#6e6e6e;
    background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:3px 10px;max-width:100%}
  .tchip .nm{color:var(--text);font-weight:600}
  .tchip .in{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:340px}
  .tchip.fail{border-color:#f0b6b2;color:var(--err)}
  .tchip.pend .nm::after{content:"…"}
  details.interim{margin:0 0 10px;border-left:3px solid var(--border);padding-left:10px}
  details.interim summary{cursor:pointer;color:var(--muted);font-size:12.5px;user-select:none}
  details.interim .body{color:var(--muted);font-size:13.5px;margin-top:6px}
  .answer{word-wrap:break-word}
  .answer p{margin:.55em 0}
  .answer h1,.answer h2,.answer h3{font-size:1.06em;margin:.9em 0 .35em}
  .answer table{border-collapse:collapse;margin:.6em 0;font-size:13.5px}
  .answer th,.answer td{border:1px solid #e0e0e0;padding:4px 9px}
  .answer th{background:var(--panel)}
  .answer code{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:.9em}
  .answer pre{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px;overflow-x:auto}
  .answer pre code{border:none;background:none;padding:0}
  .answer ul,.answer ol{margin:.4em 0;padding-left:1.4em}
  .cite{display:inline-block;background:#eef4fc;border:1px solid #cfe0f5;color:#1b5fa8;
    border-radius:5px;padding:0 6px;font-size:.86em;white-space:nowrap}
  .cite.amber{background:#fff6e0;border-color:#eeda9f;color:#8a6400}
  .errbox{background:#fdecec;border:1px solid #f2c4c0;color:#a4322a;border-radius:8px;
    padding:10px 14px;margin:8px 0;font-size:13.5px;white-space:pre-wrap}
  .status{color:var(--muted);font-size:12.5px;margin:6px 0}
  .cursor::after{content:"▍";color:var(--text);animation:blink 1s step-end infinite}
  @keyframes blink{50%{opacity:0}}
  footer{flex:0 0 auto;padding:12px max(16px,calc(50% - 384px)) 16px;background:var(--bg)}
  .composer{display:flex;gap:8px;align-items:flex-end;background:var(--bg);
    border:1px solid #dcdcdc;border-radius:26px;padding:8px 8px 8px 18px;
    box-shadow:0 2px 14px rgba(0,0,0,.05)}
  textarea{flex:1;background:none;border:none;outline:none;color:var(--text);resize:none;
    font:inherit;max-height:180px;padding:6px 8px 6px 0}
  button{background:#0d0d0d;color:#fff;border:none;border-radius:999px;
    padding:10px 18px;font:600 14px/1 inherit;cursor:pointer}
  button:disabled{background:#e0e0e0;color:#9a9a9a;cursor:default}
  button.stop{background:#d64545;color:#fff}
  .hint{color:#b0b0b0;font-size:11.5px;margin-top:6px;text-align:center}
</style>
</head>
<body>
<header>
  <div class="dot"></div>
  <div>
    <h1>Boonesboro Lab Agent</h1>
    <div class="sub">The Allen Company · Boonesborough Asphalt Plant (BT3) · Bailey KB · KYTC Specs/KM · Contracts · JMFs · Dataverse QC</div>
  </div>
  <select id="provider" title="Which AI model answers your questions">
    <option value="claude">Claude</option>
    <option value="grok">Grok</option>
  </select>
</header>

<div id="log"></div>

<footer>
  <div class="composer">
    <textarea id="input" rows="2" placeholder="Ask about a mix, a spec requirement, a contract, a JMF, or QC data…"></textarea>
    <button id="send">Send</button>
  </div>
  <div class="hint">Enter to send · Shift+Enter for a new line · Recommendations are advisory — verify against controlling documents.</div>
</footer>

<script>
(function () {
  "use strict";
  var ENDPOINT = "/.netlify/functions/agent";
  var log = document.getElementById("log");
  var input = document.getElementById("input");
  var sendBtn = document.getElementById("send");
  var providerSel = document.getElementById("provider");
  try { providerSel.value = localStorage.getItem("bt3-provider") || "claude"; } catch(e){}
  providerSel.addEventListener("change", function(){ try { localStorage.setItem("bt3-provider", providerSel.value); } catch(e){} });
  var history = [];        // [{role, content}] — assistant entries are final text only
  var aborter = null;

  // ---------- rendering ----------
  function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function renderMd(text) {
    var html;
    if (window.marked && window.DOMPurify) {
      try { html = DOMPurify.sanitize(marked.parse(text, {breaks:true})); }
      catch(e){ html = "<p>" + esc(text).replace(/\n/g,"<br>") + "</p>"; }
    } else {
      html = "<p>" + esc(text).replace(/\n/g,"<br>") + "</p>";
    }
    // Citation chips: [SPEC p.412], [KM p.88], [JMF 00260116 ⚠ unverified], [day2-slide-047], [CID 252112 line 0320]...
    html = html.replace(/\[([^\[\]\n]{2,70})\]/g, function (m, inner) {
      if (/^(x| |✓)?$/.test(inner)) return m; // task-list brackets
      var amber = /⚠|unverified/i.test(inner);
      return '<span class="cite' + (amber ? ' amber' : '') + '">' + inner + '</span>';
    });
    return html;
  }

  function el(tag, cls, parent) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (parent) parent.appendChild(e);
    return e;
  }
  function scrollDown(){ log.scrollTop = log.scrollHeight; }

  // ---------- one agent turn ----------
  function newAgentTurn() {
    var turn = el("div","turn",log);
    var box = el("div","agent",turn);
    var state = {
      box: box,
      segText: "",           // text of the current (possibly interim) segment
      segDiv: null,          // live div for the streaming segment
      activity: null,        // chip row
      finished: false,
      gotAnswer: false
    };
    state.status = el("div","status",box);
    state.status.textContent = "Working…";
    return state;
  }

  function ensureSegDiv(st) {
    if (!st.segDiv) {
      st.segDiv = el("div","answer cursor",st.box);
    }
    return st.segDiv;
  }

  // Current streamed segment turned out to be interim reasoning (tools followed) —
  // demote it to a collapsed <details>.
  function demoteSegment(st) {
    if (!st.segDiv || !st.segText.trim()) { if (st.segDiv){st.segDiv.remove(); st.segDiv=null;} st.segText=""; return; }
    var d = document.createElement("details");
    d.className = "interim";
    d.innerHTML = "<summary>agent reasoning (interim)</summary>";
    var b = el("div","body",d);
    b.innerHTML = renderMd(st.segText);
    st.segDiv.replaceWith(d);
    st.segDiv = null; st.segText = "";
  }

  function ensureActivity(st) {
    if (!st.activity) st.activity = el("div","activity",st.box);
    return st.activity;
  }

  function summarizeInput(input) {
    try {
      var v = input.query || input.query_or_cid || input.jmf_number_or_cid || input.question || JSON.stringify(input);
      return String(v);
    } catch(e){ return ""; }
  }

  function handleEvent(st, ev) {
    switch (ev.type) {
      case "start":
        st.status.textContent = "Connected (" + (ev.model || "") + ")…";
        break;
      case "round":
        st.status.textContent = ev.forced
          ? "Round " + ev.round + " — round limit reached, wrapping up…"
          : "Round " + ev.round + "…";
        break;
      case "text":
        st.segText += ev.text;
        ensureSegDiv(st).innerHTML = renderMd(st.segText);
        scrollDown();
        break;
      case "tool": {
        demoteSegment(st);
        var chip = el("span","tchip pend",ensureActivity(st));
        chip.innerHTML = '<span class="nm">' + esc(ev.name) + '</span><span class="in">' + esc(summarizeInput(ev.input||{})) + "</span>";
        st.lastChip = chip;
        st.status.textContent = "Retrieving: " + ev.name + "…";
        scrollDown();
        break;
      }
      case "tool_result":
        if (st.lastChip) {
          st.lastChip.classList.remove("pend");
          if (!ev.ok) st.lastChip.classList.add("fail");
        }
        break;
      case "error": {
        var eb = el("div","errbox",st.box);
        eb.textContent = "⚠ " + (ev.message || "Unknown error");
        scrollDown();
        break;
      }
      case "done":
        st.finished = true;
        break;
    }
  }

  function finishTurn(st, hadStreamError) {
    st.status.remove();
    if (st.segDiv) st.segDiv.classList.remove("cursor");
    var answer = st.segText.trim();
    if (answer) {
      st.gotAnswer = true;
      history.push({ role: "assistant", content: answer });
    } else if (!hadStreamError && !st.box.querySelector(".errbox")) {
      var eb = el("div","errbox",st.box);
      eb.textContent = "⚠ No answer was produced (stream ended empty). This is a failure, not a blank — try again or check the Netlify function logs.";
    }
    scrollDown();
  }

  // ---------- send / stream ----------
  async function send() {
    var q = input.value.trim();
    if (!q || aborter) return;
    input.value = ""; autoGrow();
    var ut = el("div","turn",log);
    el("div","user-msg",ut).textContent = q;
    history.push({ role: "user", content: q });
    scrollDown();

    var st = newAgentTurn();
    aborter = new AbortController();
    sendBtn.textContent = "Stop"; sendBtn.classList.add("stop");

    var hadStreamError = false;
    try {
      var res = await fetch(ENDPOINT, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ messages: history.slice(-16), provider: providerSel.value }),
        signal: aborter.signal
      });
      if (!res.ok || !res.body) {
        var t = "";
        try { t = await res.text(); } catch(e){}
        throw new Error("HTTP " + res.status + (t ? " — " + t.slice(0,300) : ""));
      }
      var reader = res.body.getReader();
      var dec = new TextDecoder();
      var buf = "";
      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buf += dec.decode(chunk.value, { stream: true });
        var idx;
        while ((idx = buf.indexOf("\n\n")) >= 0) {
          var frame = buf.slice(0, idx); buf = buf.slice(idx + 2);
          var line = frame.split("\n").find(function(l){ return l.indexOf("data:") === 0; });
          if (!line) continue;
          var ev;
          try { ev = JSON.parse(line.slice(5)); } catch(e){ continue; }
          handleEvent(st, ev);
        }
      }
    } catch (e) {
      hadStreamError = true;
      var msg = (e.name === "AbortError") ? "Stopped by user." :
        "Request failed: " + (e.message || e) + "\nNothing was hidden — this is the raw failure.";
      var eb = el("div","errbox",st.box);
      eb.textContent = "⚠ " + msg;
    } finally {
      finishTurn(st, hadStreamError);
      aborter = null;
      sendBtn.textContent = "Send"; sendBtn.classList.remove("stop");
      input.focus();
    }
  }

  sendBtn.addEventListener("click", function () {
    if (aborter) { aborter.abort(); return; }
    send();
  });
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!aborter) send(); }
  });
  function autoGrow(){ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,180)+"px"; }
  input.addEventListener("input", autoGrow);

  // welcome note
  var w = el("div","turn",log);
  var wb = el("div","agent",w);
  wb.innerHTML = '<div class="answer"><p><strong>Boonesboro Lab Agent</strong> — one agent, five sources: Bailey Method KB, KYTC Standard Specs &amp; Kentucky Methods, contract proposals/special provisions, plant JMFs, and (pending IT hookup) live Dataverse QC data.</p><p style="color:var(--muted);font-size:13.5px">Examples: “What are the JMF targets and bin splits for 00260116?” · “Does contract 252112 have any special provisions on surface mixtures?” · “Our 0.38A is running fine on the 8 — should we bump the #8 bin?”</p></div>';

  input.focus();
})();
</script>
</body>
</html>
