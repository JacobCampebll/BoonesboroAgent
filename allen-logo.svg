<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 60" role="img" aria-label="The Allen Co. Inc — Serving Kentucky — Since 1939">
  <style>
    .h{font-family:"Arial Black","Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:900;fill:#000}
    .s{font-family:"Arial Narrow",Arial,Helvetica,sans-serif;font-weight:700;fill:#000}
    .w{fill:#fff}
  </style>
  <!-- top row: THE  ====  CO. -->
  <text class="s" x="2" y="15" font-size="10">THE</text>
  <rect x="30" y="9" width="52" height="4" fill="#000"/>
  <text class="s" x="266" y="15" font-size="10" text-anchor="end">CO.</text>
  <rect x="186" y="9" width="52" height="4" fill="#000"/>
  <!-- ALLEN wordmark -->
  <text class="h" x="134" y="37" font-size="34" letter-spacing="1" text-anchor="middle">ALLEN</text>
  <!-- INC banner -->
  <rect x="114" y="39" width="40" height="12" fill="#000"/>
  <text class="w s" x="134" y="48.5" font-size="9" text-anchor="middle" letter-spacing="2">INC</text>
  <!-- bottom rule + taglines -->
  <rect x="0" y="53" width="96" height="2.4" fill="#000"/>
  <rect x="172" y="53" width="96" height="2.4" fill="#000"/>
  <text class="s" x="2" y="58.5" font-size="7">SERVING KENTUCKY</text>
  <text class="s" x="266" y="58.5" font-size="7" text-anchor="end">SINCE 1939</text>
</svg>
